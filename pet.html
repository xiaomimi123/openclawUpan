<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: transparent;
  overflow: hidden;
  user-select: none;
  font-family: 'Microsoft YaHei', 'Segoe UI', Arial, sans-serif;
  width: 220px;
  height: 340px;
}

.wrapper {
  position: absolute;
  bottom: 0; right: 0;
  width: 210px;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 8px;
  padding: 0 10px 6px 0;
}

/* ── Bubble ── */
.bubble {
  display: none;
  flex-direction: column;
  gap: 8px;
  background: rgba(11, 11, 26, 0.95);
  border: 1px solid #1e1e35;
  border-radius: 12px;
  padding: 12px 14px;
  width: 192px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 20px rgba(231,72,86,.08);
  animation: popIn .15s ease;
}
.bubble.show { display: flex; }

@keyframes popIn {
  from { transform: scale(0.85) translateY(8px); opacity: 0; }
  to   { transform: scale(1)    translateY(0);   opacity: 1; }
}

.bubble-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.bubble-status {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 12px;
  color: #e8e0e0;
  font-weight: 500;
}
.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #4ecdc4;
  flex-shrink: 0;
  animation: blink 2s ease-in-out infinite;
}
.status-dot.stopped { background: #e74856; animation: none; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }

.bubble-close {
  background: none; border: none;
  color: #454560; font-size: 14px;
  cursor: pointer; line-height: 1; padding: 0 2px;
}
.bubble-close:hover { color: #7a7a9a; }

.bubble-btn {
  width: 100%; padding: 7px 10px;
  border: none; border-radius: 7px;
  font-size: 12px; font-weight: 600;
  cursor: pointer; font-family: inherit;
  transition: opacity .15s;
}
.bubble-btn:hover  { opacity: 0.85; }
.bubble-btn:active { opacity: 0.7; }
.btn-ui  { background: linear-gradient(135deg,#e74856,#c92a3a); color:#fff; }
.btn-hide { background:transparent; color:#6b6b8a; border:1px solid #1e1e35; font-weight:400; }

/* ── Pet ── */
.pet {
  cursor: pointer;
  -webkit-app-region: drag;
  animation: idle 3.5s ease-in-out infinite;
  transition: transform .12s;
  filter: drop-shadow(0 6px 14px rgba(0,0,0,0.55));
}
.pet:hover { animation: hover-bounce .4s ease-in-out infinite alternate; }

@keyframes idle {
  0%,100% { transform: rotate(-5deg) translateY(0); }
  25%      { transform: rotate(0deg)  translateY(-4px); }
  50%      { transform: rotate(5deg)  translateY(0); }
  75%      { transform: rotate(0deg)  translateY(-4px); }
}
@keyframes hover-bounce {
  from { transform: translateY(0) scale(1.05); }
  to   { transform: translateY(-5px) scale(1.1); }
}

button { -webkit-app-region: no-drag; }
</style>
</head>
<body>

<div class="wrapper">

  <div class="bubble" id="bubble">
    <div class="bubble-header">
      <div class="bubble-status">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">OpenClaw 运行中</span>
      </div>
      <button class="bubble-close" onclick="hideBubble()">✕</button>
    </div>
    <button class="bubble-btn btn-ui" id="btn-ui" onclick="openUI()">🌐 打开控制界面</button>
    <button class="bubble-btn btn-hide" onclick="hideBubble()">收起</button>
  </div>

  <!-- 卡通龙虾 SVG -->
  <div class="pet" id="pet" onclick="toggleBubble()">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 145" width="92" height="111">
      <defs>
        <radialGradient id="bodyG" cx="38%" cy="32%" r="62%">
          <stop offset="0%"   stop-color="#FF6644"/>
          <stop offset="100%" stop-color="#CC2C0A"/>
        </radialGradient>
        <radialGradient id="clawG" cx="32%" cy="28%" r="68%">
          <stop offset="0%"   stop-color="#FF5530"/>
          <stop offset="100%" stop-color="#BB2005"/>
        </radialGradient>
        <radialGradient id="eyeG" cx="40%" cy="35%" r="60%">
          <stop offset="0%"   stop-color="#2a2a6a"/>
          <stop offset="100%" stop-color="#0a0a20"/>
        </radialGradient>
      </defs>

      <!-- ── 尾巴 ── -->
      <ellipse cx="60" cy="133" rx="13" ry="8"   fill="#BB2A08"/>
      <ellipse cx="45" cy="130" rx="10" ry="6.5" fill="#CC3010" transform="rotate(-22 45 130)"/>
      <ellipse cx="75" cy="130" rx="10" ry="6.5" fill="#CC3010" transform="rotate( 22 75 130)"/>
      <ellipse cx="60" cy="133" rx="5"  ry="3"   fill="#AA1E04" opacity=".6"/>

      <!-- ── 身体 ── -->
      <ellipse cx="60" cy="99" rx="23" ry="28" fill="url(#bodyG)"/>
      <!-- 壳纹 -->
      <ellipse cx="60" cy="89"  rx="20" ry="4.5" fill="#AA2408" opacity=".28"/>
      <ellipse cx="60" cy="100" rx="20" ry="4.5" fill="#AA2408" opacity=".28"/>
      <ellipse cx="60" cy="111" rx="19" ry="4"   fill="#AA2408" opacity=".28"/>
      <!-- 身体高光 -->
      <ellipse cx="52" cy="82" rx="8" ry="4" fill="white" opacity=".12" transform="rotate(-15 52 82)"/>

      <!-- ── 左臂 + 左钳 ── -->
      <path d="M 40 87 Q 24 80 14 70" stroke="#DD3D18" stroke-width="6.5" fill="none" stroke-linecap="round"/>
      <ellipse cx="11" cy="62" rx="14" ry="10" fill="url(#clawG)" transform="rotate(-28 11 62)"/>
      <ellipse cx="5"  cy="69" rx="8"  ry="6"  fill="#A81C04"     transform="rotate(-28 5 69)"/>
      <path d="M 3 66 Q 8 63 10 70" stroke="#881400" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      <!-- 钳高光 -->
      <ellipse cx="8" cy="57" rx="4" ry="2.5" fill="white" opacity=".18" transform="rotate(-28 8 57)"/>

      <!-- ── 右臂 + 右钳 ── -->
      <path d="M 80 87 Q 96 80 106 70" stroke="#DD3D18" stroke-width="6.5" fill="none" stroke-linecap="round"/>
      <ellipse cx="109" cy="62" rx="14" ry="10" fill="url(#clawG)" transform="rotate( 28 109 62)"/>
      <ellipse cx="115" cy="69" rx="8"  ry="6"  fill="#A81C04"     transform="rotate( 28 115 69)"/>
      <path d="M 117 66 Q 112 63 110 70" stroke="#881400" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      <ellipse cx="112" cy="57" rx="4" ry="2.5" fill="white" opacity=".18" transform="rotate(28 112 57)"/>

      <!-- ── 步足 ── -->
      <line x1="41" y1="97"  x2="27" y2="108" stroke="#CC3010" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="39" y1="106" x2="23" y2="118" stroke="#CC3010" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="79" y1="97"  x2="93" y2="108" stroke="#CC3010" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="81" y1="106" x2="97" y2="118" stroke="#CC3010" stroke-width="2.5" stroke-linecap="round"/>

      <!-- ── 头部 ── -->
      <circle cx="60" cy="48" r="33" fill="url(#bodyG)"/>
      <!-- 头高光 -->
      <ellipse cx="47" cy="30" rx="11" ry="7" fill="white" opacity=".16" transform="rotate(-18 47 30)"/>

      <!-- ── 触角 ── -->
      <path d="M 47 20 Q 32 6 20 0"  stroke="#BB2A08" stroke-width="2.8" fill="none" stroke-linecap="round"/>
      <path d="M 73 20 Q 88 6 100 0" stroke="#BB2A08" stroke-width="2.8" fill="none" stroke-linecap="round"/>
      <circle cx="20"  cy="0" r="3" fill="#FF6644"/>
      <circle cx="100" cy="0" r="3" fill="#FF6644"/>

      <!-- ── 眼睛 ── -->
      <!-- 左眼 -->
      <circle cx="43" cy="46" r="11"  fill="white"/>
      <circle cx="43" cy="46" r="10"  fill="white" stroke="#EEE" stroke-width="0.5"/>
      <circle cx="45" cy="48" r="7"   fill="url(#eyeG)"/>
      <circle cx="42" cy="44" r="2.8" fill="white"/>
      <circle cx="47" cy="52" r="1.1" fill="white" opacity=".55"/>
      <!-- 右眼 -->
      <circle cx="77" cy="46" r="11"  fill="white"/>
      <circle cx="77" cy="46" r="10"  fill="white" stroke="#EEE" stroke-width="0.5"/>
      <circle cx="75" cy="48" r="7"   fill="url(#eyeG)"/>
      <circle cx="72" cy="44" r="2.8" fill="white"/>
      <circle cx="76" cy="52" r="1.1" fill="white" opacity=".55"/>

      <!-- ── 腮红 ── -->
      <circle cx="34" cy="60" r="8" fill="#FF7050" opacity=".28"/>
      <circle cx="86" cy="60" r="8" fill="#FF7050" opacity=".28"/>

      <!-- ── 嘴巴 ── -->
      <path d="M 50 64 Q 60 72 70 64" stroke="#AA2408" stroke-width="2.5" fill="none"
            stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

</div>

<script>
let bubbleVisible = false

function toggleBubble() {
  bubbleVisible = !bubbleVisible
  document.getElementById('bubble').classList.toggle('show', bubbleVisible)
}

function hideBubble() {
  bubbleVisible = false
  document.getElementById('bubble').classList.remove('show')
}

function openUI() {
  window.pet.openUI()
  hideBubble()
}

window.pet.onStatusUpdate((status) => {
  const dot   = document.getElementById('status-dot')
  const text  = document.getElementById('status-text')
  const btnUI = document.getElementById('btn-ui')
  if (status.running) {
    dot.className     = 'status-dot'
    text.textContent  = 'OpenClaw 运行中'
    btnUI.style.display = ''
  } else {
    dot.className     = 'status-dot stopped'
    text.textContent  = 'OpenClaw 已停止'
    btnUI.style.display = 'none'
  }
})

// 点击穿透控制
document.addEventListener('mousemove', (e) => {
  const el   = document.elementFromPoint(e.clientX, e.clientY)
  const over = el && el !== document.documentElement && el !== document.body
  window.pet.setIgnoreMouseEvents(!over)
})
</script>
</body>
</html>
